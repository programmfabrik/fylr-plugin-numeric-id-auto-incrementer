plugin:
  name: numeric-id-auto-incrementer
  version: 1.3
  url: https://github.com/programmfabrik/fylr-plugin-numeric-id-auto-incrementer
  displayname:
    de-DE: Automatische Inkrementierung numerischer IDs
    en-US: Numeric id auto incrementer
  server:
    api-version:
      require: 1
  webfrontend:
    url: numeric-id-auto-incrementer.js
  l10n: l10n/numeric-id-auto-incrementer.csv

base_url_prefix: "webfrontend"

base_config:
  - name: numericIdAutoIncrementer
    parameters:
      incrementer_object_type:
        type: text
        plugin_type: objectTypeSelector
        position: 0
      incrementers:
        type: table
        fields:
          - name: incrementer_id
            type: text
            position: 0
          - name: object_types
            type: table
            fields:
              - name: name
                type: text
                plugin_type: objectTypeSelector
                position: 0
            position: 1
          - name: field_path
            type: text
            position: 2
          - name: id_field_name
            type: text
            position: 3
          - name: base_fields
            type: table
            fields:
              - name: field_name
                type: text
                position: 0
            position: 4
          - name: pool_ids
            type: table
            fields:
              - name: pool_id
                type: text
                position: 0
            position: 5
        position: 1

callbacks:
  db_pre_save:
    steps:
      - name: "Set values in ID fields"
        callback: setIds
    callbacks:
      setIds:
        exec:
          service: "node"
          commands:
            - prog: "node"
              stdin:
                type: body
              stdout:
                type: body
              args:
                - type: "value"
                  value: "%_exec.pluginDir%/server/setIds.js"
                - type: "value"
                  value: "%info.json%"

extensions:
  initialize:
    exec:
      service: "node"
      commands:
        - prog: "node"
          stdin:
            type: "body"
          stdout:
            type: "body"
          args:
            - type: "value"
              value: "%_exec.pluginDir%/server/extension/initialize.js"
            - type: "value"
              value: "%info.json%"
